name: devstore

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Configure l10n
        run: |
          cat > l10n.yaml << 'EOF'
          arb-dir: lib/l10n
          template-arb-file: app_en.arb
          output-localization-file: app_localizations.dart
          output-dir: lib/l10n
          synthetic-package: false
          output-class: AppLocalizations
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Fix imports
        run: |
          find lib -name "*.dart" -exec sed -i 's|package:flutter_gen/gen_l10n/app_localizations.dart|package:devstore/l10n/app_localizations.dart|g' {} +

      - name: Recreate Android project
        run: |
          cp android/app/google-services.json /tmp/google-services.json 2>/dev/null || true
          rm -rf android
          flutter create . --platforms=android --org com.devstore --project-name app
          mkdir -p android/app
          cp /tmp/google-services.json android/app/ 2>/dev/null || true

      - name: Add Firebase plugin to app build.gradle
        run: |
          sed -i 's/id "dev.flutter.flutter-gradle-plugin"/id "dev.flutter.flutter-gradle-plugin"\n    id "com.google.gms.google-services" version "4.4.0"/' android/app/build.gradle

      - name: Add Firebase plugin to settings.gradle
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.8.22" apply false/id "org.jetbrains.kotlin.android" version "1.8.22" apply false\n    id "com.google.gms.google-services" version "4.4.0" apply false/' android/settings.gradle

      - name: Fix minSdkVersion
        run: |
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle

      - name: Setup MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/devstore/app
          cat > android/app/src/main/kotlin/com/devstore/app/MainActivity.kt << 'EOF'
          package com.devstore.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

      - name: Set app name in AndroidManifest
        run: |
          sed -i 's/android:label="[^"]*"/android:label="DEVSTORE"/' android/app/src/main/AndroidManifest.xml

      - name: Create black splash theme
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/values-night
          mkdir -p android/app/src/main/res/drawable
          
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF
          
          cp android/app/src/main/res/values/styles.xml android/app/src/main/res/values-night/styles.xml
          
          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/black" />
          </layer-list>
          EOF

      - name: Create asset directories
        run: |
          mkdir -p assets/images
          if [ -f assets/icons ]; then
            mv assets/icons /tmp/icons_backup
            mkdir -p assets/icons
            mv /tmp/icons_backup assets/icons/
          else
            mkdir -p assets/icons || true
          fi

      - name: Get dependencies again
        run: flutter pub get

      - name: Generate app icons
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: devstore-apk
          path: build/app/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/app-release.apk"
          tag: v${{ github.run_number }}
          name: "DEVSTORE v${{ github.run_number }}"
          body: "DEVSTORE Android Release"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Configure l10n
        run: |
          cat > l10n.yaml << 'EOF'
          arb-dir: lib/l10n
          template-arb-file: app_en.arb
          output-localization-file: app_localizations.dart
          output-dir: lib/l10n
          synthetic-package: false
          output-class: AppLocalizations
          EOF

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web (Admin Panel)
        run: flutter build web --release -t lib/main_admin.dart

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: devstore-web
          path: build/web

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: devstore-web
          path: build/web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
