name: devstore

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Check Android manifest
        run: |
          echo "=== AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml
          echo ""
          echo "=== MainActivity.kt ==="
          find android -name "MainActivity.kt" -exec cat {} \;
          echo ""
          echo "=== gradle.properties ==="
          cat android/gradle.properties
          echo ""
          echo "=== build.gradle (app) ==="
          cat android/app/build.gradle

      - name: Build APK (verbose)
        run: flutter build apk --release --verbose 2>&1 | tail -200
        continue-on-error: true

      - name: Show full error log
        if: failure()
        run: |
          echo "=== FULL BUILD LOG ==="
          flutter build apk --release --verbose 2>&1 | grep -E "error|Error|FAIL|v1|embedding|Registrar|flutterEmbedding" | head -50

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: devstore-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify main_admin.dart exists
        run: |
          echo "=== Checking lib/ contents ==="
          ls -la lib/
          echo ""
          echo "=== Checking main_admin.dart ==="
          test -f lib/main_admin.dart && echo "EXISTS" || echo "NOT FOUND"

      - name: Build Web (Admin Panel)
        run: flutter build web --release -t lib/main_admin.dart --verbose 2>&1 | tail -100

      - name: Upload Web Build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: devstore-web
          path: build/web
