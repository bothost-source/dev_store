name: devstore

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Recreate Android project
        run: |
          cp android/app/google-services.json /tmp/google-services.json 2>/dev/null || true
          rm -rf android
          flutter create . --platforms=android --org com.example --project-name devstore
          mkdir -p android/app
          cp /tmp/google-services.json android/app/ 2>/dev/null || true

      - name: Fix package name
        run: |
          sed -i 's/applicationId "com.example.dev_store"/applicationId "com.example.devstore"/' android/app/build.gradle

      - name: Add Firebase plugin to app build.gradle
        run: |
          sed -i 's/id "dev.flutter.flutter-gradle-plugin"/id "dev.flutter.flutter-gradle-plugin"\n    id "com.google.gms.google-services" version "4.4.0"/' android/app/build.gradle

      - name: Add Firebase plugin to settings.gradle
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.8.22" apply false/id "org.jetbrains.kotlin.android" version "1.8.22" apply false\n    id "com.google.gms.google-services" version "4.4.0" apply false/' android/settings.gradle

      - name: Fix minSdkVersion
        run: |
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle

      - name: Setup MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/devstore
          cat > android/app/src/main/kotlin/com/example/devstore/MainActivity.kt << 'EOF'
          package com.example.devstore
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: devstore-apk
          path: build/app/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/app-release.apk"
          tag: v${{ github.run_number }}
          name: "DEVSTORE v${{ github.run_number }}"
          body: "DEVSTORE Android Release"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build Web (Admin Panel)
        run: flutter build web --release -t lib/main_admin.dart

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: devstore-web
          path: build/web

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: devstore-web
          path: build/web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
